<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply - Local Jobs Connect</title>
  <link rel="icon" type="image/svg+xml" href="assets/job-connect-icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>

<body data-page="apply">
  <header class="site-header">
    <a class="brand" href="/" aria-label="Local Jobs Connect home">
      <img class="brand-mark" src="assets/job-connect-icon.svg" alt="" aria-hidden="true">
      <span>Local Jobs Connect</span>
    </a>
    <nav aria-label="Main navigation">
      <a href="/jobs.html">Jobs</a>
      <a href="/post.html">Post Job</a>
      <a href="/applications.html">Applications</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Job seeker</p>
      <h1>Apply for this job</h1>
      <p>Your application will be stored in the database for the employer to review.</p>
    </section>

    <section class="apply-layout">
      <article class="job-card" id="jobDetails">
        <p>Loading job details...</p>
      </article>

      <form class="apply-form page-form" id="applyForm">
        <label>
          Full name
          <input name="name" required placeholder="Your name">
        </label>
        <label>
          Phone number
          <input name="phone" required placeholder="0888 000 000">
        </label>
        <label>
          Area where you live
          <input name="area" required placeholder="Kawale">
        </label>
        <label class="wide">
          Message
          <textarea name="message" rows="5" required placeholder="Tell the employer why you are suitable."></textarea>
        </label>
        <button class="button primary wide" type="submit">Submit application</button>
      </form>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>

</html>
