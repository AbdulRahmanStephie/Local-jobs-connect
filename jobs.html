<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs - Local Jobs Connect</title>
  <link rel="icon" type="image/svg+xml" href="assets/job-connect-icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>

<body data-page="jobs">
  <div class="page-shell">
    <aside class="sidebar">
      <a class="brand" href="/" aria-label="Local Jobs Connect home">
        <img class="brand-mark" src="assets/job-connect-icon.svg" alt="" aria-hidden="true">
        <span>Local Jobs Connect</span>
      </a>
      <nav aria-label="Sidebar navigation">
        <a href="/">Home</a>
        <a href="/jobs.html" aria-current="page">Jobs</a>
        <a href="/post.html">Post Job</a>
        <a href="/applications.html">Applications</a>
      </nav>
    </aside>

    <div class="page-content">
      <header class="site-header"></header>

      <main>
        <section class="page-hero">
          <p class="eyebrow">Available work</p>
          <h1>Browse local job opportunities</h1>
          <p>Use the filters to find work near you. Every job is loaded from the database.</p>
        </section>

        <section class="jobs-section">
          <form class="filters" id="filters" aria-label="Job filters">
            <label>
              Search
              <input id="searchInput" type="search" placeholder="Cleaner, garden, security">
            </label>
            <label>
              Service
              <select id="categoryInput">
                <option value="all">All services</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Gardening">Gardening</option>
                <option value="House Help">House Help</option>
                <option value="Security">Security</option>
                <option value="Shop Assistant">Shop Assistant</option>
              </select>
            </label>
            <label>
              Area
              <input id="areaInput" placeholder="Area 25">
            </label>
          </form>

          <div class="job-list" id="jobList" aria-live="polite"></div>
        </section>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <script src="script.js"></script>
    </div>
  </div>
</body>

</html>
